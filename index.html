<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1612">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Montage — review films with photos, tweets, drawings, and more.">
  <title>MONTAGE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,300;0,400;1,300&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=4">
</head>
<body>
  <div class="grain"></div>
  <div id="app">
    <header class="topbar">
      <h1 class="topbar__logo">Montage</h1>
      <div class="topbar__avatar">S</div>
    </header>
    <main id="content"></main>
    <div class="search-overlay">
      <input class="search-input" type="text" placeholder="Search films…" autocomplete="off">
      <div class="search-results"></div>
    </div>
    <nav class="bottomnav">
      <button class="nav-btn nav-btn--active" data-action="nav" data-tab="feed">
        <span class="nav-btn__icon">⬡</span>
        <span class="nav-btn__label">Feed</span>
      </button>
      <button class="nav-btn" data-action="nav" data-tab="search">
        <span class="nav-btn__icon">◎</span>
        <span class="nav-btn__label">Discover</span>
      </button>
      <button class="nav-btn" data-action="nav" data-tab="compose">
        <span class="nav-btn__icon nav-btn__icon--create">✦</span>
        <span class="nav-btn__label">Create</span>
      </button>
      <button class="nav-btn" data-action="nav" data-tab="profile">
        <span class="nav-btn__icon">◐</span>
        <span class="nav-btn__label">You</span>
      </button>
    </nav>
  </div>
  <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
  <script type="module" src="js/app.js?v=4"></script>
</body>
</html>
